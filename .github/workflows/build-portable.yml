name: Portable build

# Portable (zip-and-run) artifacts: 3 OSes x 2 architectures = 6 jobs.
# RUI_PORTABLE=ON, archived (ZIP/TGZ), carries the "portable" marker so
# the app logs to its own folder. The installer artifacts are built by the
# separate build-installer.yml workflow.
#
# Build requirements (one-time setup on self-hosted runners)
# - C++23-capable toolchain (saucer requires C++23)
# Windows:
# - Visual Studio 2022/2026 with C++ workload (MSVC v143, Windows 10/11 SDK)
# - CMake 3.25+, Ninja, Git for Windows in PATH
# - MSYS2 at C:\msys64 with: autoconf, automake, libtool, pkgconf, make,
#   mingw-w64-x86_64-toolchain, mingw-w64-x86_64-libusb (x64) and/or
#   mingw-w64-clang-aarch64-toolchain, mingw-w64-clang-aarch64-libusb (arm64)
# - libusb-win32 driver files at C:\libusb-win32
# Linux:
# - build-essential, cmake 3.25+, git, ninja-build, pkg-config
# - libgtk-3-dev, libwebkit2gtk-4.1-dev, libadwaita-1-dev, libudev-dev, libusb-1.0-0-dev
# - autoconf, automake, libtool, dh-autoreconf
# macOS:
# - Xcode Command Line Tools
# - Homebrew packages: cmake 3.25+, ninja, pkgconf, libusb, autoconf, automake, libtool

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  RKDEV_REPO: https://github.com/lux-robotics/rkdeveloptool.git
  RKDEV_TAG: master
  LIBWDI_LIBUSB0_DIR: C:/libusb-win32
  # Extra -D flag for the Windows configure step. Empty by default (native
  # builds); the Windows arm64 cross job overrides it (via GITHUB_ENV) to point
  # the main build at the host-generated libwdi headers.
  LIBWDI_PREBUILT_ARG: ""
  # Artifactory configuration
  ARTIFACTORY_URL: ${{ secrets.ARTIFACTORY_URL }}
  ARTIFACTORY_REPO: ${{ secrets.ARTIFACTORY_REPO }}
  ARTIFACTORY_USER: ${{ secrets.ARTIFACTORY_USER }}
  ARTIFACTORY_TOKEN: ${{ secrets.ARTIFACTORY_TOKEN }}
  # macOS code signing + notarization. All optional: if MACOS_CERTIFICATE is
  # empty the macOS jobs skip signing and fall back to the ad-hoc signature
  # from the build (unnotarized). A downloaded portable .app still needs
  # notarization to launch under Gatekeeper, so this applies here too.
  # MACOS_CERTIFICATE is a base64-encoded Developer ID Application .p12;
  # MACOS_SIGN_IDENTITY is its identity ("Developer ID Application: NAME (TEAMID)").
  # Notarization additionally needs APPLE_ID + APPLE_APP_PASSWORD + APPLE_TEAM_ID.
  MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
  MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
  MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
  APPLE_ID: ${{ secrets.APPLE_ID }}
  APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

jobs:
  build:
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:

        # ---------- Windows (single x64 host; arm64 cross-compiles) ----------
        - name: Windows_x64_portable
          os: windows
          arch: x64
          runs_on: [self-hosted, Windows, X64]
          cpack_generator: ZIP
          vcvars: vcvars64.bat
          msystem: MINGW64
          msys2_libusb: mingw-w64-x86_64-libusb
          rkdev_enable: "true"
          libwdi_enable: "true"

        - name: Windows_arm64_portable
          os: windows
          arch: arm64
          runs_on: [self-hosted, Windows, X64]
          cpack_generator: ZIP
          # Everything is real arm64. App + libwdi cross-compile with the MSVC
          # x64->arm64 toolchain (vcvarsamd64_arm64); rkdeveloptool + its libusb
          # are cross-built with a pre-installed llvm-mingw toolchain (MSYS2's
          # arm64 toolchain can't run on an x64 host). libwdi's build-time
          # codegen tools are built separately on the host (see that step).
          vcvars: vcvarsamd64_arm64.bat
          msystem: MINGW64
          rkdev_enable: "true"
          libwdi_enable: "true"
          cross: "true"
          rkdev_cross_host: aarch64-w64-mingw32
          llvm_mingw_dir: C:/llvm-mingw
          # Built from source by the "Build arm64 libusb" step below (short
          # path, out of the deep workspace), not assumed pre-installed.
          cross_libusb_prefix: C:/w/libusb-arm64

        # ---------- Linux (x64 only; no arm64 runner / no cross yet) ----------
        - name: Linux_x64_portable
          os: linux
          arch: x64
          runs_on: [self-hosted, Linux, X64]
          cpack_generator: TGZ

        # ---------- macOS (single Intel host; arm64 cross-compiles) ----------
        - name: MacOS_x86_64_portable
          os: macos
          arch: x86_64
          runs_on: [self-hosted, macOS, X64]
          cpack_generator: ZIP
          osx_arch: x86_64

        - name: MacOS_arm64_portable
          os: macos
          arch: arm64
          runs_on: [self-hosted, macOS, X64]
          cpack_generator: ZIP
          osx_arch: arm64
          cross: "true"

    runs-on: ${{ matrix.runs_on }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ----------------------- Configure -----------------------
      # Windows arm64 cross only: build libwdi's codegen tools with the HOST
      # (x64) toolchain and emit the generated headers, because the embedder
      # must run on the build host while the main build targets arm64. Uses
      # vcvars64 (host), not the job's cross vcvars.
      - name: Build libwdi host tools (Windows cross)
        if: ${{ matrix.os == 'windows' && matrix.cross == 'true' && matrix.libwdi_enable == 'true' }}
        shell: cmd
        run: |
          for /f "usebackq delims=" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -property installationPath`) do set VSINSTALL=%%i
          call "%VSINSTALL%\VC\Auxiliary\Build\vcvars64.bat"
          set "OUTDIR=%GITHUB_WORKSPACE:\=/%/libwdi_generated"
          cmake -S cmake/libwdi_host -B build_libwdi_host -G Ninja -DCMAKE_BUILD_TYPE=Release ^
            -DFETCHCONTENT_BASE_DIR=C:/w/libwdi-host/deps ^
            -DLIBWDI_LIBUSB0_DIR="${{ env.LIBWDI_LIBUSB0_DIR }}" ^
            -DLIBWDI_OUTPUT_DIR="%OUTDIR%"
          cmake --build build_libwdi_host --config Release
          echo LIBWDI_PREBUILT_ARG=-DLIBWDI_PREBUILT_GENERATED_DIR=%OUTDIR%>>%GITHUB_ENV%

      # Windows arm64 cross only: build libusb-1.0 from source with the
      # llvm-mingw cross toolchain (no prebuilt arm64 libusb exists for an x64
      # host). rkdeveloptool links this and ships its DLL. Mirrors the macOS
      # "Stage arm64 libusb" step - built by CI, not assumed on the runner.
      - name: Build arm64 libusb (Windows cross)
        if: ${{ matrix.os == 'windows' && matrix.cross == 'true' }}
        shell: cmd
        run: |
          C:\msys64\usr\bin\bash -lc "set -e && export PATH=$(cygpath -u '${{ matrix.llvm_mingw_dir }}')/bin:$PATH && PREFIX=$(cygpath -u '${{ matrix.cross_libusb_prefix }}') && SCRIPT=$(cygpath -u '%GITHUB_WORKSPACE%')/cmake/build_libusb_mingw.sh && bash \"$SCRIPT\" \"${{ matrix.rkdev_cross_host }}\" \"$PREFIX\""

      - name: Configure Windows
        if: matrix.os == 'windows'
        shell: cmd
        run: |
          for /f "usebackq delims=" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -property installationPath`) do set VSINSTALL=%%i
          call "%VSINSTALL%\VC\Auxiliary\Build\${{ matrix.vcvars }}"
          rem Pull fetched deps out of the deep runner workspace so their nested
          rem subbuild stamp paths stay under Windows' 260-char limit.
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release ^
            -DFETCHCONTENT_BASE_DIR=C:/w/${{ matrix.arch }}/deps ^
            -DRUI_PORTABLE=ON ^
            -DRKDEV_REPO=${{ env.RKDEV_REPO }} -DRKDEV_TAG=${{ env.RKDEV_TAG }} ^
            -DRKDEV_BASH=C:/msys64/usr/bin/bash.exe -DRKDEV_MSYSTEM=${{ matrix.msystem }} ^
            -DRKDEV_ENABLE=${{ matrix.rkdev_enable }} ^
            -DLIBWDI_ENABLE=${{ matrix.libwdi_enable }} -DLIBWDI_LIBUSB0_DIR="${{ env.LIBWDI_LIBUSB0_DIR }}" ^
            %LIBWDI_PREBUILT_ARG% ${{ matrix.rkdev_cross_host && format('-DRKDEV_CROSS_HOST={0} -DRKDEV_LLVM_MINGW_DIR={1} -DRKDEV_CROSS_LIBUSB_PREFIX={2}', matrix.rkdev_cross_host, matrix.llvm_mingw_dir, matrix.cross_libusb_prefix) || '' }}

      - name: Configure Linux
        if: matrix.os == 'linux'
        run: |
          # saucer needs GCC >= 14; Ubuntu 24.04's default g++ is 13, so force
          # g++-14 (apt install g++-14) rather than bypassing saucer's version
          # check and hitting internal template-deduction failures.
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DRUI_PORTABLE=ON \
            -DCMAKE_C_COMPILER=gcc-14 -DCMAKE_CXX_COMPILER=g++-14 \
            -DRKDEV_REPO=${{ env.RKDEV_REPO }} \
            -DRKDEV_TAG=${{ env.RKDEV_TAG }}

      # When cross-building to arm64 on an Intel host, the host's Homebrew
      # libusb is x86_64 - useless for linking the arm64 app + rkdeveloptool
      # and for the shipped companion dylib. Build a fresh arm64 libusb from
      # source into a staging prefix (correct .pc file), and set its install
      # name to the Homebrew path the CMake install_name_tool rules already
      # rewrite, so nothing downstream needs to special-case the cross build.
      - name: Stage arm64 libusb (macOS cross)
        if: ${{ matrix.os == 'macos' && matrix.cross == 'true' }}
        run: |
          set -euo pipefail
          VER="1.0.27"
          STAGE="$RUNNER_TEMP/libusb-arm64"
          rm -rf "$STAGE" "$RUNNER_TEMP/libusb-src"
          mkdir -p "$STAGE" "$RUNNER_TEMP/libusb-src"
          curl -fL -o "$RUNNER_TEMP/libusb.tar.bz2" \
            "https://github.com/libusb/libusb/releases/download/v${VER}/libusb-${VER}.tar.bz2"
          tar -xjf "$RUNNER_TEMP/libusb.tar.bz2" -C "$RUNNER_TEMP/libusb-src" --strip-components=1
          cd "$RUNNER_TEMP/libusb-src"
          ./configure --host=aarch64-apple-darwin --prefix="$STAGE" \
            CFLAGS="-arch arm64" LDFLAGS="-arch arm64"
          make -j"$(sysctl -n hw.ncpu)"
          make install
          # rkdeveloptool and the app record a dylib's install name (LC_ID_DYLIB)
          # as their load command - point it at the Homebrew path so the
          # existing "-change /opt/homebrew.../-change /usr/local..." rewrites
          # in CMakeLists apply unchanged.
          install_name_tool -id /opt/homebrew/opt/libusb/lib/libusb-1.0.0.dylib \
            "$STAGE/lib/libusb-1.0.0.dylib"
          echo "PKG_CONFIG_PATH=$STAGE/lib/pkgconfig" >> "$GITHUB_ENV"
          echo "RUI_LIBUSB_DYLIB=$STAGE/lib/libusb-1.0.0.dylib" >> "$GITHUB_ENV"

      - name: Configure macOS
        if: matrix.os == 'macos'
        run: |
          # PKG_CONFIG_PATH (set above for the cross job) points pkg-config at
          # the arm64 libusb; the native x86_64 job leaves it unset and the
          # build auto-detects the host's Homebrew libusb as before.
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DRUI_PORTABLE=ON \
            -DRKDEV_REPO=${{ env.RKDEV_REPO }} \
            -DRKDEV_TAG=${{ env.RKDEV_TAG }} \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.osx_arch }} \
            ${RUI_LIBUSB_DYLIB:+-DRKDEV_LIBUSB_DYLIB="$RUI_LIBUSB_DYLIB"} \
            -Dsaucer_no_compiler_version_check=ON

      # ------------------------- Build -------------------------
      - name: Build (Windows)
        if: matrix.os == 'windows'
        shell: cmd
        run: |
          for /f "usebackq delims=" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -property installationPath`) do set VSINSTALL=%%i
          call "%VSINSTALL%\VC\Auxiliary\Build\${{ matrix.vcvars }}"
          cmake --build build --config Release

      - name: Build (Unix)
        if: matrix.os != 'windows'
        run: cmake --build build --config Release

      # ------------------- macOS signing -------------------
      # Runs before packaging so the ZIP carries the signed, stapled app.
      # Skipped (falling back to the build's ad-hoc signature) when no cert
      # secret is configured.
      - name: Import signing certificate (macOS)
        if: ${{ matrix.os == 'macos' && env.MACOS_CERTIFICATE != '' }}
        run: |
          set -euo pipefail
          KEYCHAIN="$GITHUB_WORKSPACE/signing.keychain-db"
          KP="ci-$RANDOM-$RANDOM"
          echo "$MACOS_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          # Preserve the runner's existing user keychain search list so the
          # cleanup step can restore it (these are the user's own machines).
          ORIG=$(security list-keychains -d user | sed 's/[\"[:space:]]//g' | tr '\n' ' ')
          echo "ORIG_KEYCHAINS=$ORIG" >> "$GITHUB_ENV"
          security create-keychain -p "$KP" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KP" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KP" "$KEYCHAIN" >/dev/null
          # Prepend our keychain to the search list so codesign can find the identity.
          security list-keychains -d user -s "$KEYCHAIN" $ORIG
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Sign app (macOS)
        if: ${{ matrix.os == 'macos' && env.MACOS_CERTIFICATE != '' }}
        run: |
          set -euo pipefail
          APP="build/bin/rockchip-universal-imager.app"
          ENT="$GITHUB_WORKSPACE/packaging/macos/entitlements.plist"
          ID="$MACOS_SIGN_IDENTITY"
          # Inner-to-outer: nested dylibs + companion executables first (with
          # the hardened runtime, which notarization requires), then the whole
          # bundle last. libusb is signed with the same identity, so the app's
          # library validation accepts loading it.
          find "$APP" -type f \( -name '*.dylib' -o -perm +111 \) \
            -exec codesign --force --timestamp --options runtime -s "$ID" {} \;
          # Portable layout ships rkdeveloptool + libusb beside the .app.
          for f in build/bin/rkdeveloptool build/bin/libusb-1.0.0.dylib; do
            [ -f "$f" ] && codesign --force --timestamp --options runtime -s "$ID" "$f" || true
          done
          codesign --force --timestamp --options runtime --entitlements "$ENT" -s "$ID" "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP"

      - name: Notarize and staple (macOS)
        if: ${{ matrix.os == 'macos' && env.MACOS_CERTIFICATE != '' && env.APPLE_ID != '' }}
        run: |
          set -euo pipefail
          APP="build/bin/rockchip-universal-imager.app"
          ditto -c -k --keepParent "$APP" "$RUNNER_TEMP/notarize.zip"
          xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
            --apple-id "$APPLE_ID" --password "$APPLE_APP_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait
          # Staple the ticket to the .app; the ZIP built next then carries a
          # notarized+stapled app that passes Gatekeeper offline.
          xcrun stapler staple "$APP"
          rm -f "$RUNNER_TEMP/notarize.zip"

      # ------------------------ Package ------------------------
      - name: Package (Windows)
        if: matrix.os == 'windows'
        shell: cmd
        run: |
          mkdir upload_pkg
          cd build
          cpack -G "${{ matrix.cpack_generator }}" -C Release -B "%GITHUB_WORKSPACE%\upload_pkg"

      - name: Package (Unix)
        if: matrix.os != 'windows'
        run: |
          mkdir -p upload_pkg
          cd build
          cpack -G "${{ matrix.cpack_generator }}" -C Release -B "$GITHUB_WORKSPACE/upload_pkg"

      # cpack drops the package(s) plus staging dirs into upload_pkg; keep only
      # the finished artifacts before upload.
      - name: Collect artifacts (Unix)
        if: matrix.os != 'windows'
        run: |
          cd upload_pkg
          find . -maxdepth 1 -type d ! -name '_CPack_Packages' ! -name '.' -exec rm -rf {} + || true
          rm -rf _CPack_Packages
          ls -la

      - name: Collect artifacts (Windows)
        if: matrix.os == 'windows'
        shell: cmd
        run: |
          if exist upload_pkg\_CPack_Packages rmdir /s /q upload_pkg\_CPack_Packages
          dir upload_pkg

      # ------------------- Upload to Artifactory -------------------
      - name: Upload to Artifactory (Windows)
        if: ${{ matrix.os == 'windows' && env.ARTIFACTORY_URL != '' && env.ARTIFACTORY_REPO != '' && env.ARTIFACTORY_USER != '' && env.ARTIFACTORY_TOKEN != '' }}
        shell: cmd
        run: |
          set "SAFE_WORKFLOW=%GITHUB_WORKFLOW: =-%"
          for %%f in (upload_pkg\*) do (
            echo Uploading %%~nxf
            curl.exe -u "%ARTIFACTORY_USER%:%ARTIFACTORY_TOKEN%" -T "%%f" "%ARTIFACTORY_URL%/%ARTIFACTORY_REPO%/%GITHUB_REPOSITORY%/%SAFE_WORKFLOW%/%GITHUB_RUN_NUMBER%/${{ matrix.name }}/%%~nxf"
          )
          echo Upload complete

      - name: Upload to Artifactory (Unix)
        if: ${{ matrix.os != 'windows' && env.ARTIFACTORY_URL != '' && env.ARTIFACTORY_REPO != '' && env.ARTIFACTORY_USER != '' && env.ARTIFACTORY_TOKEN != '' }}
        shell: bash
        run: |
          set -euo pipefail
          SAFE_WORKFLOW="${GITHUB_WORKFLOW// /-}"
          BASE="${ARTIFACTORY_URL}/${ARTIFACTORY_REPO}/${GITHUB_REPOSITORY}/${SAFE_WORKFLOW}/${GITHUB_RUN_NUMBER}/${{ matrix.name }}"
          for f in upload_pkg/*; do
            [ -f "$f" ] || continue
            echo "Uploading $(basename "$f")"
            curl -u "${ARTIFACTORY_USER}:${ARTIFACTORY_TOKEN}" -T "$f" "${BASE}/$(basename "$f")"
          done
          echo "Upload complete"

      # Always remove the temporary signing keychain and restore the runner's
      # original keychain search list - these are self-hosted machines, so a
      # leftover keychain would accumulate and could shadow later builds.
      - name: Clean up signing keychain (macOS)
        if: ${{ always() && matrix.os == 'macos' && env.MACOS_CERTIFICATE != '' }}
        run: |
          security delete-keychain "$GITHUB_WORKSPACE/signing.keychain-db" 2>/dev/null || true
          if [ -n "${ORIG_KEYCHAINS:-}" ]; then
            security list-keychains -d user -s $ORIG_KEYCHAINS || true
          fi
