# Build rkdeveloptool for six targets (own-OS + arm64 where needed).
#
# Runners: selected by GitHub’s automatic self-hosted labels only
# (no custom hostnames — any machine with matching OS+arch works):
#
#   [self-hosted, Linux,  X64]   → linux-x86_64
#   [self-hosted, Linux,  ARM64] → linux-aarch64  (native)
#   [self-hosted, Windows, X64]  → windows-x86_64, windows-aarch64
#   [self-hosted, macOS,  X64]   → macos-x86_64,  macos-aarch64
#
# Upstream build (from rkdeveloptool Readme):
#   ./autogen.sh && ./configure && make
#   needs: libusb-1.0, pkg-config, autoconf/automake/libtool, C++ toolchain
#
# Pre-installed expectations (see packaging/*/bootstrap-build-deps.*):
#   Linux:   build-essential, pkg-config, autoconf, automake, libtool,
#            libudev-dev; native gcc on each arch host
#   macOS:   Xcode CLT, pkg-config, automake, autoconf, libtool
#   Windows: MSYS2 (MINGW64 gcc, autotools) + llvm-mingw for aarch64-w64-mingw32
#            Shell: C:/msys64/usr/bin/bash.exe (matrix cannot use env context)
#            Env: MSYS2_ROOT, LLVM_MINGW_ROOT (optional discovery)
#
# libusb policy (option B — always the same path):
#   For every OS/arch cell, download libusb source, build static-only into a
#   private prefix for that target (correct --host / -arch), and static-link
#   into rkdeveloptool. No host brew/MSYS/apt libusb, no side-by-side DLL/dylib.
#
# Artifact per matrix cell:
#   rkdeveloptool-<os>-<arch>/
#     rkdeveloptool[.exe]
#     BUILD.txt

name: Build rkdeveloptool

on:
  workflow_dispatch:
  # Called by package.yaml so one pipeline can build companions + app + zips.
  workflow_call:

concurrency:
  group: build-rkdeveloptool-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Always built from source and static-linked (every matrix cell).
  LIBUSB_VERSION: "1.0.27"
  LIBUSB_TARBALL_URL: "https://github.com/libusb/libusb/releases/download/v1.0.27/libusb-1.0.27.tar.bz2"

jobs:
  build:
    name: rkdeveloptool (${{ matrix.os_label }}-${{ matrix.arch_label }})
    runs-on: ${{ matrix.runner }}
    # Windows: MSYS2 bash path as a plain string (env.* is invalid in matrix.shell).
    defaults:
      run:
        shell: ${{ matrix.shell }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- Linux: native builds on matching arch hosts ---
          - runner: [self-hosted, Linux, X64]
            shell: bash
            os_label: linux
            arch_label: x86_64
            host_triple: x86_64-linux-gnu
            cross: false
          - runner: [self-hosted, Linux, ARM64]
            shell: bash
            os_label: linux
            arch_label: aarch64
            host_triple: aarch64-linux-gnu
            cross: false

          # --- Windows X64 host: Windows products only (native + aarch64 cross) ---
          - runner: [self-hosted, Windows, X64]
            shell: C:/msys64/usr/bin/bash.exe --noprofile --norc -e {0}
            os_label: windows
            arch_label: x86_64
            host_triple: x86_64-w64-mingw32
            cross: false
          - runner: [self-hosted, Windows, X64]
            shell: C:/msys64/usr/bin/bash.exe --noprofile --norc -e {0}
            os_label: windows
            arch_label: aarch64
            host_triple: aarch64-w64-mingw32
            cross: true

          # --- macOS X64 host: macOS products only ---
          - runner: [self-hosted, macOS, X64]
            shell: bash
            os_label: macos
            arch_label: x86_64
            host_triple: x86_64-apple-darwin
            cross: false
          - runner: [self-hosted, macOS, X64]
            shell: bash
            os_label: macos
            arch_label: aarch64
            host_triple: aarch64-apple-darwin
            cross: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Build rkdeveloptool + stage artifacts
        env:
          OS_LABEL: ${{ matrix.os_label }}
          ARCH_LABEL: ${{ matrix.arch_label }}
          HOST_TRIPLE: ${{ matrix.host_triple }}
          CROSS: ${{ matrix.cross }}
          LIBUSB_VERSION: ${{ env.LIBUSB_VERSION }}
          LIBUSB_TARBALL_URL: ${{ env.LIBUSB_TARBALL_URL }}
        run: |
          set -euo pipefail

          # cwd is the job workspace (Actions). Relative source avoids Windows
          # GITHUB_WORKSPACE backslash paths under MSYS.
          # shellcheck source=packaging/ci/ci-env.sh
          source packaging/ci/ci-env.sh

          # Prefer Actions GITHUB_WORKSPACE (any drive / OneDrive / etc.), normalized.
          WS="$(ci_workspace)"
          echo "workspace (unix)=$WS"
          cd "$WS"

          UPSTREAM="${WS}/dependencies/rkdeveloptool"
          # Private trees under the job workspace only (parallel-safe, install-independent).
          SRC="${WS}/build/src-rkdeveloptool-${OS_LABEL}-${ARCH_LABEL}"
          BUILD="${WS}/build/rkdeveloptool-${OS_LABEL}-${ARCH_LABEL}"
          PREFIX="${WS}/build/prefix-${OS_LABEL}-${ARCH_LABEL}"
          STAGE="${WS}/dist/rkdeveloptool-${OS_LABEL}-${ARCH_LABEL}"
          LIBUSB_SRC="${WS}/build/libusb-src-${OS_LABEL}-${ARCH_LABEL}"
          LIBUSB_PREFIX="${WS}/build/libusb-prefix-${OS_LABEL}-${ARCH_LABEL}"

          test -d "$UPSTREAM"
          rm -rf "$SRC" "$BUILD" "$PREFIX" "$STAGE"
          mkdir -p "$(dirname "$SRC")" "$BUILD" "$PREFIX" "$STAGE"
          cp -a "$UPSTREAM" "$SRC"

          # Toolchain PATH: discover MSYS2 / llvm-mingw / brew / cargo (no fixed drive).
          ci_setup_toolchain_path "$OS_LABEL"

          need() {
            if ! command -v "$1" >/dev/null 2>&1; then
              echo "ERROR: required tool not found: $1" >&2
              exit 1
            fi
          }

          need bash
          need make
          need pkg-config || need pkgconf

          # ------------------------------------------------------------------
          # Select CC/CXX for target
          # ------------------------------------------------------------------
          select_compiler() {
            unset CC CXX AR RANLIB STRIP CONFIGURE_HOST ARCH_CFLAGS ARCH_LDFLAGS || true
            case "$OS_LABEL-$ARCH_LABEL" in
              linux-x86_64)
                export CC="${CC:-gcc}"
                export CXX="${CXX:-g++}"
                ;;
              linux-aarch64)
                # Prefer native gcc on ARM64 runners; fall back to cross triple on x86 hosts.
                if [[ "$(uname -m)" == "aarch64" || "$(uname -m)" == "arm64" ]]; then
                  export CC="${CC:-gcc}"
                  export CXX="${CXX:-g++}"
                else
                  export CC="${CC:-aarch64-linux-gnu-gcc}"
                  export CXX="${CXX:-aarch64-linux-gnu-g++}"
                  CONFIGURE_HOST="--host=aarch64-linux-gnu"
                fi
                ;;
              windows-x86_64)
                export CC="${CC:-x86_64-w64-mingw32-gcc}"
                export CXX="${CXX:-x86_64-w64-mingw32-g++}"
                # MSYS2 MinGW64 often exposes plain gcc when PATH has /mingw64/bin first
                if ! command -v "$CC" >/dev/null 2>&1; then
                  export CC=gcc
                  export CXX=g++
                fi
                CONFIGURE_HOST="--host=x86_64-w64-mingw32"
                ;;
              windows-aarch64)
                export CC="${CC:-aarch64-w64-mingw32-gcc}"
                export CXX="${CXX:-aarch64-w64-mingw32-g++}"
                CONFIGURE_HOST="--host=aarch64-w64-mingw32"
                ;;
              macos-x86_64)
                export CC="${CC:-clang}"
                export CXX="${CXX:-clang++}"
                ARCH_CFLAGS="-arch x86_64"
                ARCH_LDFLAGS="-arch x86_64"
                export CFLAGS="${CFLAGS:-} ${ARCH_CFLAGS}"
                export CXXFLAGS="${CXXFLAGS:-} ${ARCH_CFLAGS}"
                export LDFLAGS="${LDFLAGS:-} ${ARCH_LDFLAGS}"
                # Cross from Apple Silicon → Intel: configure must not try to run arm binaries.
                if [[ "$(uname -m)" != "x86_64" ]]; then
                  CONFIGURE_HOST="--host=x86_64-apple-darwin"
                fi
                ;;
              macos-aarch64)
                export CC="${CC:-clang}"
                export CXX="${CXX:-clang++}"
                ARCH_CFLAGS="-arch arm64"
                ARCH_LDFLAGS="-arch arm64"
                export CFLAGS="${CFLAGS:-} ${ARCH_CFLAGS}"
                export CXXFLAGS="${CXXFLAGS:-} ${ARCH_CFLAGS}"
                export LDFLAGS="${LDFLAGS:-} ${ARCH_LDFLAGS}"
                # Cross from Intel → Apple Silicon: without --host, configure fails with
                # "cannot run C compiled programs" (arm64 test binary on x86_64 host).
                if [[ "$(uname -m)" != "arm64" ]]; then
                  CONFIGURE_HOST="--host=aarch64-apple-darwin"
                fi
                ;;
              *)
                echo "Unknown OS/arch: $OS_LABEL-$ARCH_LABEL" >&2
                exit 1
                ;;
            esac
            # rkdeveloptool Makefile.am uses -Werror; silence known-noisy warnings from
            # older/MinGW-only code paths (VLA, unused vars like szProgramProcPath on MinGW).
            export CXXFLAGS="${CXXFLAGS:-} -Wno-unused-variable -Wno-error=unused-variable"
            export CFLAGS="${CFLAGS:-} -Wno-unused-variable -Wno-error=unused-variable"
            if [[ "$OS_LABEL" == "macos" ]]; then
              export CXXFLAGS="${CXXFLAGS:-} -Wno-vla-cxx-extension -Wno-error=vla-cxx-extension"
              export CFLAGS="${CFLAGS:-} -Wno-vla-cxx-extension -Wno-error=vla-cxx-extension"
            fi
            need "$CC"
            need "$CXX"
            echo "Using CC=$CC CXX=$CXX host_uname=$(uname -m) ${CONFIGURE_HOST:-}"
          }

          select_compiler

          # ------------------------------------------------------------------
          # libusb: always static from source (same path for every matrix cell)
          # ------------------------------------------------------------------
          build_libusb_static() {
            need curl
            need tar
            mkdir -p "$LIBUSB_SRC" "$LIBUSB_PREFIX"
            local tarball="${WS}/build/libusb-${LIBUSB_VERSION}.tar.bz2"
            if [[ ! -f "$tarball" ]]; then
              echo "libusb: downloading ${LIBUSB_TARBALL_URL}"
              curl -fsSL "$LIBUSB_TARBALL_URL" -o "$tarball"
            fi
            rm -rf "${LIBUSB_SRC:?}"
            mkdir -p "$LIBUSB_SRC"
            tar -xjf "$tarball" -C "$LIBUSB_SRC" --strip-components=1

            # Static only. udev only for native Linux (hotplug backend).
            local conf_args=(
              --prefix="$LIBUSB_PREFIX"
              --disable-shared
              --enable-static
            )
            if [[ "$OS_LABEL" == "linux" && -z "${CONFIGURE_HOST:-}" ]]; then
              conf_args+=(--enable-udev)
            else
              conf_args+=(--disable-udev)
            fi
            if [[ -n "${CONFIGURE_HOST:-}" ]]; then
              conf_args+=("${CONFIGURE_HOST}")
            fi

            echo "libusb: configure ${conf_args[*]} CC=$CC"
            (
              cd "$LIBUSB_SRC"
              ./configure "${conf_args[@]}" \
                CC="$CC" \
                CXX="$CXX" \
                CFLAGS="${CFLAGS:-}" \
                CXXFLAGS="${CXXFLAGS:-}" \
                LDFLAGS="${LDFLAGS:-}"
              make -j"$(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 2)"
              make install
            )
            test -f "$LIBUSB_PREFIX/lib/libusb-1.0.a"

            export PKG_CONFIG_PATH="$LIBUSB_PREFIX/lib/pkgconfig${PKG_CONFIG_PATH:+:$PKG_CONFIG_PATH}"
            export LIBUSB1_CFLAGS="-I$LIBUSB_PREFIX/include/libusb-1.0"
            case "$OS_LABEL" in
              macos)
                export LIBUSB1_LIBS="$LIBUSB_PREFIX/lib/libusb-1.0.a -lobjc -framework IOKit -framework CoreFoundation -framework Security"
                ;;
              windows)
                export LIBUSB1_LIBS="$LIBUSB_PREFIX/lib/libusb-1.0.a -lsetupapi -lole32 -ladvapi32"
                ;;
              linux)
                if [[ " ${conf_args[*]} " == *" --enable-udev "* ]]; then
                  export LIBUSB1_LIBS="$LIBUSB_PREFIX/lib/libusb-1.0.a -ludev -lpthread"
                else
                  export LIBUSB1_LIBS="$LIBUSB_PREFIX/lib/libusb-1.0.a -lpthread"
                fi
                ;;
            esac
            echo "libusb: static OK -> $LIBUSB_PREFIX/lib/libusb-1.0.a"
            echo "  LIBUSB1_CFLAGS=$LIBUSB1_CFLAGS"
            echo "  LIBUSB1_LIBS=$LIBUSB1_LIBS"
          }

          build_libusb_static

          # ------------------------------------------------------------------
          # rkdeveloptool autotools build
          # ------------------------------------------------------------------
          # PKG_CHECK_MODULES needs pkg-config to see libusb-1.0 (our prefix).
          # make still gets explicit LIBUSB1_* so the static .a always wins.
          if [[ ! -x "$SRC/configure" ]]; then
            (
              cd "$SRC"
              ./autogen.sh
            )
          fi

          if ! pkg-config --exists libusb-1.0; then
            echo "ERROR: pkg-config cannot see libusb-1.0 (PKG_CONFIG_PATH=${PKG_CONFIG_PATH:-})" >&2
            exit 1
          fi
          echo "pkg-config libusb-1.0: $(pkg-config --modversion libusb-1.0) (private static prefix)"

          (
            cd "$BUILD"
            # shellcheck disable=SC2086
            "$SRC/configure" \
              ${CONFIGURE_HOST:-} \
              --prefix="$PREFIX" \
              CC="$CC" \
              CXX="$CXX" \
              CFLAGS="${CFLAGS:-}" \
              CXXFLAGS="${CXXFLAGS:-}" \
              LDFLAGS="${LDFLAGS:-}"
            make -j"$(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 2)" \
              LIBUSB1_CFLAGS="$LIBUSB1_CFLAGS" \
              LIBUSB1_LIBS="$LIBUSB1_LIBS"
            make install \
              LIBUSB1_CFLAGS="$LIBUSB1_CFLAGS" \
              LIBUSB1_LIBS="$LIBUSB1_LIBS" || true
          )

          # Locate built binary
          BUILT=""
          for c in \
            "$PREFIX/bin/rkdeveloptool.exe" \
            "$PREFIX/bin/rkdeveloptool" \
            "$BUILD/rkdeveloptool.exe" \
            "$BUILD/rkdeveloptool" \
            "$BUILD/.libs/rkdeveloptool.exe" \
            "$BUILD/.libs/rkdeveloptool"; do
            if [[ -f "$c" ]]; then
              BUILT="$c"
              break
            fi
          done
          if [[ -z "$BUILT" ]]; then
            echo "ERROR: rkdeveloptool binary not found after build" >&2
            find "$BUILD" -type f | head -50 >&2 || true
            exit 1
          fi

          # ------------------------------------------------------------------
          # Stage output (binary only — libusb is static-linked)
          # ------------------------------------------------------------------
          rm -rf "$STAGE"
          mkdir -p "$STAGE"
          if [[ "$OS_LABEL" == "windows" ]]; then
            cp "$BUILT" "$STAGE/rkdeveloptool.exe"
          else
            cp "$BUILT" "$STAGE/rkdeveloptool"
            chmod +x "$STAGE/rkdeveloptool"
          fi

          {
            echo "rkdeveloptool artifact"
            echo "os=$OS_LABEL arch=$ARCH_LABEL host_triple=$HOST_TRIPLE"
            echo "cc=$CC cxx=$CXX"
            echo "libusb_mode=static-from-source"
            echo "libusb_prefix=$LIBUSB_PREFIX"
            echo "built_from=$BUILT"
            echo "git_sha=${GITHUB_SHA:-unknown}"
            date -u +"%Y-%m-%dT%H:%M:%SZ"
            echo ""
            echo "files:"
            ls -la "$STAGE"
            echo ""
            if [[ "$OS_LABEL" == "macos" ]]; then
              echo "otool -L:"
              otool -L "$STAGE/rkdeveloptool" 2>/dev/null || true
            elif [[ "$OS_LABEL" == "linux" ]]; then
              echo "ldd / readelf:"
              ldd "$STAGE/rkdeveloptool" 2>/dev/null || readelf -d "$STAGE/rkdeveloptool" 2>/dev/null || true
            elif [[ "$OS_LABEL" == "windows" ]]; then
              echo "Note: libusb static-linked; no libusb-1.0.dll required beside the exe."
            fi
          } >"$STAGE/BUILD.txt"

          echo "==== staged ===="
          cat "$STAGE/BUILD.txt"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: rkdeveloptool-${{ matrix.os_label }}-${{ matrix.arch_label }}
          path: dist/rkdeveloptool-${{ matrix.os_label }}-${{ matrix.arch_label }}/
          if-no-files-found: error
