# Build the Tauri app only (no rkdeveloptool compile, no packaging).
#
# Artifact per matrix cell: app-<os>-<arch>/
#   macOS:  "Rockchip Universal Imager.app"/  (+ APP.txt)
#   others: rockchip-universal-imager[.exe]   (+ APP.txt)
#
# linux-aarch64 GUI omitted (needs native arm64 Linux runner).
#
# Windows notes:
#   - Targets are *-pc-windows-msvc (not gnu). Host must be MSVC for cargo install.
#   - Do not put llvm-mingw first on PATH (breaks host link with missing -lgcc).
#     llvm-mingw is only for build-rkdeveloptool windows-aarch64.

name: Build app

on:
  workflow_dispatch:
  workflow_call:

concurrency:
  group: build-app-${{ github.workflow }}-${{ github.run_id }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # App builds never need llvm-mingw on PATH (rkdeveloptool job does).
  CI_SKIP_LLVM_MINGW: "1"

jobs:
  app:
    name: app (${{ matrix.os_label }}-${{ matrix.arch_label }})
    runs-on: ${{ matrix.runner }}
    # Cross-compiling full Tauri release can exceed default; fail clearly instead of hanging.
    timeout-minutes: 90
    defaults:
      run:
        shell: ${{ matrix.shell }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: [self-hosted, Linux, X64]
            shell: bash
            os_label: linux
            arch_label: x86_64
            rust_target: x86_64-unknown-linux-gnu
            app_name: rockchip-universal-imager
          - runner: [self-hosted, Windows, X64]
            shell: C:/msys64/usr/bin/bash.exe --noprofile --norc -e {0}
            os_label: windows
            arch_label: x86_64
            rust_target: x86_64-pc-windows-msvc
            app_name: rockchip-universal-imager.exe
          - runner: [self-hosted, Windows, X64]
            shell: C:/msys64/usr/bin/bash.exe --noprofile --norc -e {0}
            os_label: windows
            arch_label: aarch64
            rust_target: aarch64-pc-windows-msvc
            app_name: rockchip-universal-imager.exe
          - runner: [self-hosted, macOS, X64]
            shell: bash
            os_label: macos
            arch_label: x86_64
            rust_target: x86_64-apple-darwin
            app_name: rockchip-universal-imager
          - runner: [self-hosted, macOS, X64]
            shell: bash
            os_label: macos
            arch_label: aarch64
            rust_target: aarch64-apple-darwin
            app_name: rockchip-universal-imager

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # PATH changes only persist across steps via GITHUB_PATH. Without this,
      # Swatinem/rust-cache fails with: Command failed: rustc -vV
      - name: Ensure Rust stable + target
        env:
          OS_LABEL: ${{ matrix.os_label }}
        run: |
          set -euo pipefail
          source packaging/ci/ci-env.sh
          cd "$(ci_workspace)"
          ci_setup_toolchain_path "$OS_LABEL"
          ci_ensure_rust "${{ matrix.rust_target }}"
          if [[ "$OS_LABEL" == "windows" ]]; then
            ci_prefer_windows_msvc_host
            rustc -vV
            if ! rustc -vV | grep -q "host: x86_64-pc-windows-msvc"; then
              echo "WARNING: host is not x86_64-pc-windows-msvc — cargo install may use gnu + break" >&2
              rustup show || true
            fi
          fi

      # Self-hosted runners already keep cargo/target on disk. Caching only the
      # registry/git indexes avoids multi-GB target uploads that hang post-job.
      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          workspaces: src-tauri -> target
          shared-key: app-${{ matrix.os_label }}-${{ matrix.arch_label }}
          cache-targets: false
          cache-on-failure: true

      - name: Install tauri-cli
        env:
          OS_LABEL: ${{ matrix.os_label }}
        run: |
          set -euo pipefail
          source packaging/ci/ci-env.sh
          cd "$(ci_workspace)"
          ci_setup_toolchain_path "$OS_LABEL"
          ci_ensure_cargo_path
          if [[ "$OS_LABEL" == "windows" ]]; then
            ci_prefer_windows_msvc_host
            # Ensure no stale mingw/llvm CC leaks into host build scripts
            unset CC CXX AR CFLAGS CXXFLAGS LDFLAGS || true
            unset CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER || true
          fi

          if command -v cargo-tauri >/dev/null 2>&1; then
            echo "tauri-cli present: $(cargo-tauri --version 2>/dev/null || true)"
          elif cargo tauri --version >/dev/null 2>&1; then
            echo "tauri-cli present via cargo: $(cargo tauri --version)"
          else
            echo "Installing tauri-cli ^2 (host=$(rustc -vV | sed -n 's/^host: //p'))…"
            # Explicit host target on Windows avoids accidental gnu builds
            if [[ "$OS_LABEL" == "windows" ]]; then
              cargo install tauri-cli --version "^2" --locked --target x86_64-pc-windows-msvc
            else
              cargo install tauri-cli --version "^2" --locked
            fi
          fi
          cargo tauri --version

      - name: Build Tauri app
        env:
          OS_LABEL: ${{ matrix.os_label }}
          ARCH_LABEL: ${{ matrix.arch_label }}
          RUST_TARGET: ${{ matrix.rust_target }}
          APP_NAME: ${{ matrix.app_name }}
        run: |
          set -euo pipefail
          source packaging/ci/ci-env.sh
          WS="$(ci_workspace)"
          cd "$WS"
          ci_setup_toolchain_path "$OS_LABEL"
          ci_ensure_cargo_path
          if [[ "$OS_LABEL" == "windows" ]]; then
            ci_prefer_windows_msvc_host
            unset CC CXX || true
          fi

          command -v rustc
          command -v cargo
          rustc -vV
          cargo tauri --version

          case "$OS_LABEL-$ARCH_LABEL" in
            macos-x86_64)
              export CARGO_TARGET_X86_64_APPLE_DARWIN_LINKER="${CARGO_TARGET_X86_64_APPLE_DARWIN_LINKER:-clang}"
              export CFLAGS_x86_64_apple_darwin="${CFLAGS_x86_64_apple_darwin:--arch x86_64}"
              export SDKROOT="${SDKROOT:-$(xcrun --sdk macosx --show-sdk-path 2>/dev/null || true)}"
              ;;
            macos-aarch64)
              export CARGO_TARGET_AARCH64_APPLE_DARWIN_LINKER="${CARGO_TARGET_AARCH64_APPLE_DARWIN_LINKER:-clang}"
              export CFLAGS_aarch64_apple_darwin="${CFLAGS_aarch64_apple_darwin:--arch arm64}"
              export SDKROOT="${SDKROOT:-$(xcrun --sdk macosx --show-sdk-path 2>/dev/null || true)}"
              ;;
            windows-aarch64)
              # Cross MSVC arm64 from x64 host — needs VS Build Tools ARM64 package.
              echo "Building aarch64-pc-windows-msvc (host MSVC x64)"
              rustup target list --installed | grep -q aarch64-pc-windows-msvc
              ;;
          esac

          if [[ "$OS_LABEL" == "windows" && ! -f src-tauri/icons/icon.ico ]]; then
            echo "ERROR: src-tauri/icons/icon.ico missing" >&2
            exit 1
          fi

          OUT="${WS}/dist/app-${OS_LABEL}-${ARCH_LABEL}"
          rm -rf "$OUT"
          mkdir -p "$OUT"

          if [[ "$OS_LABEL" == "macos" ]]; then
            # Produce a real .app bundle
            cargo tauri build --target "$RUST_TARGET" --bundles app
            BUNDLE_DIR="${WS}/src-tauri/target/${RUST_TARGET}/release/bundle/macos"
            APP_PATH="$(find "$BUNDLE_DIR" -maxdepth 1 -type d -name '*.app' | head -1)"
            test -n "$APP_PATH" && test -d "$APP_PATH"
            cp -R "$APP_PATH" "$OUT/"
            # Normalize name
            if [[ "$(basename "$APP_PATH")" != "Rockchip Universal Imager.app" ]]; then
              mv "$OUT/$(basename "$APP_PATH")" "$OUT/Rockchip Universal Imager.app"
            fi
            # Keep execute bits for the staged artifact (Actions zip can still
            # drop them on download — package-cell.sh restores them again).
            STAGED_APP="$OUT/Rockchip Universal Imager.app"
            find "$STAGED_APP/Contents/MacOS" -type f -exec chmod u+x {} + 2>/dev/null || true
            if command -v codesign >/dev/null 2>&1; then
              codesign --force --deep --sign - "$STAGED_APP" || true
            fi
          else
            cargo tauri build --no-bundle --target "$RUST_TARGET"
            APP_BIN="${WS}/src-tauri/target/${RUST_TARGET}/release/${APP_NAME}"
            test -f "$APP_BIN"
            cp "$APP_BIN" "$OUT/$APP_NAME"
            chmod +x "$OUT/$APP_NAME" 2>/dev/null || true
          fi

          {
            echo "app artifact"
            echo "os=$OS_LABEL arch=$ARCH_LABEL target=$RUST_TARGET"
            echo "app_name=$APP_NAME"
            echo "git_sha=${GITHUB_SHA:-unknown}"
            date -u +"%Y-%m-%dT%H:%M:%SZ"
            ls -la "$OUT"
          } >"$OUT/APP.txt"

      - name: Upload app artifact
        uses: actions/upload-artifact@v5
        with:
          name: app-${{ matrix.os_label }}-${{ matrix.arch_label }}
          path: dist/app-${{ matrix.os_label }}-${{ matrix.arch_label }}/
          if-no-files-found: error
