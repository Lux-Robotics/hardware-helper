# Full distribution pipeline: compile companions + app, then package per OS/arch.
#
#   package.yaml
#     ├─ build-rkdeveloptool → rkdeveloptool-<os>-<arch>
#     ├─ build-app           → app-<os>-<arch>  (.app on macOS)
#     └─ package matrix (5 cells) → per-cell portable zip + real installer
#
# Portable (one zip per OS/arch): app + rkdeveloptool + loader_binaries only
#   (no portable marker, no README)
#
# Installer (one file per OS/arch):
#   Windows → NSIS setup.exe
#   macOS   → DMG (drag .app to Applications; companions beside .app)
#   Linux   → .deb under /opt/rockchip-universal-imager
#
# Logs always use OS user log dirs (see src-tauri/src/logging.rs).

name: Package

on:
  workflow_dispatch:

concurrency:
  group: package-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

jobs:
  companions:
    name: Build rkdeveloptool
    uses: ./.github/workflows/build-rkdeveloptool.yaml

  apps:
    name: Build app
    uses: ./.github/workflows/build-app.yaml

  package:
    name: package (${{ matrix.os_label }}-${{ matrix.arch_label }})
    needs: [companions, apps]
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: ${{ matrix.shell }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: [self-hosted, Linux, X64]
            shell: bash
            os_label: linux
            arch_label: x86_64
            app_name: rockchip-universal-imager
            rk_name: rkdeveloptool
          - runner: [self-hosted, Windows, X64]
            shell: C:/msys64/usr/bin/bash.exe --noprofile --norc -e {0}
            os_label: windows
            arch_label: x86_64
            app_name: rockchip-universal-imager.exe
            rk_name: rkdeveloptool.exe
          - runner: [self-hosted, Windows, X64]
            shell: C:/msys64/usr/bin/bash.exe --noprofile --norc -e {0}
            os_label: windows
            arch_label: aarch64
            app_name: rockchip-universal-imager.exe
            rk_name: rkdeveloptool.exe
          - runner: [self-hosted, macOS, X64]
            shell: bash
            os_label: macos
            arch_label: x86_64
            app_name: rockchip-universal-imager
            rk_name: rkdeveloptool
          - runner: [self-hosted, macOS, X64]
            shell: bash
            os_label: macos
            arch_label: aarch64
            app_name: rockchip-universal-imager
            rk_name: rkdeveloptool

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download rkdeveloptool artifact
        uses: actions/download-artifact@v4
        with:
          name: rkdeveloptool-${{ matrix.os_label }}-${{ matrix.arch_label }}
          path: dist/in/rkdeveloptool-${{ matrix.os_label }}-${{ matrix.arch_label }}

      - name: Download app artifact
        uses: actions/download-artifact@v4
        with:
          name: app-${{ matrix.os_label }}-${{ matrix.arch_label }}
          path: dist/in/app-${{ matrix.os_label }}-${{ matrix.arch_label }}

      - name: Package portable + installer
        env:
          OS_LABEL: ${{ matrix.os_label }}
          ARCH_LABEL: ${{ matrix.arch_label }}
          APP_NAME: ${{ matrix.app_name }}
          RK_NAME: ${{ matrix.rk_name }}
        run: |
          set -euo pipefail
          source packaging/ci/ci-env.sh
          cd "$(ci_workspace)"
          ci_setup_toolchain_path "$OS_LABEL"
          # Ensure zip / dpkg / hdiutil / makensis available on PATH where relevant
          chmod +x packaging/ci/package-cell.sh
          packaging/ci/package-cell.sh

      - name: Upload portable package
        uses: actions/upload-artifact@v4
        with:
          name: portable-${{ matrix.os_label }}-${{ matrix.arch_label }}
          path: dist/out/portable/*.zip
          if-no-files-found: error

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os_label }}-${{ matrix.arch_label }}
          path: |
            dist/out/installer/*.exe
            dist/out/installer/*.dmg
            dist/out/installer/*.deb
          if-no-files-found: error
