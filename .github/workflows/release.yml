name: Release Packaging (Artifacts Only)

on:
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # =========================
      # DOWNLOAD ARTIFACTS
      # =========================

      - name: Download Windows x64
        uses: actions/download-artifact@v4
        with:
          name: windows-x64
          path: dist/windows-x64

      - name: Download Windows ARM64
        uses: actions/download-artifact@v4
        with:
          name: windows-arm64
          path: dist/windows-arm64

      - name: Download Linux x64
        uses: actions/download-artifact@v4
        with:
          name: linux-x64
          path: dist/linux-x64

      - name: Download Linux ARM64
        uses: actions/download-artifact@v4
        with:
          name: linux-arm64
          path: dist/linux-arm64

      - name: Download macOS Intel
        uses: actions/download-artifact@v4
        with:
          name: macos-intel
          path: dist/macos-intel

      - name: Download macOS ARM64
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64
          path: dist/macos-arm64

      # =========================
      # STAGE NORMALIZED OUTPUTS
      # =========================

      - name: Stage binaries (normalize paths)
        run: |
          mkdir -p package/windows-x64
          mkdir -p package/windows-arm64
          mkdir -p package/linux-x64
          mkdir -p package/linux-arm64
          mkdir -p package/macos-intel
          mkdir -p package/macos-arm64

          # Windows (note deeper release folder)
          cp dist/windows-x64/bin/release/hardware-helper.exe package/windows-x64/
          cp dist/windows-arm64/bin/release/hardware-helper.exe package/windows-arm64/

          # Linux
          cp dist/linux-x64/bin/hardware-helper package/linux-x64/
          cp dist/linux-arm64/bin/hardware-helper package/linux-arm64/

          # macOS
          cp dist/macos-intel/bin/hardware-helper package/macos-intel/
          cp dist/macos-arm64/bin/hardware-helper package/macos-arm64/

      # =========================
      # WINDOWS PACKAGING
      # =========================

      - name: Create Windows portable ZIPs
        run: |
          cd package/windows-x64
          zip -r HardwareHelper-windows-x64.zip .

          cd ../windows-arm64
          zip -r HardwareHelper-windows-arm64.zip .

      # =========================
      # LINUX PACKAGING
      # =========================

      - name: Install Linux tools
        run: |
          sudo apt update
          sudo apt install -y dpkg-dev wget file

      - name: Build DEB packages
        run: |
          cd package/linux-x64
          dpkg-deb --build . HardwareHelper-linux-x64.deb

          cd ../linux-arm64
          dpkg-deb --build . HardwareHelper-linux-arm64.deb

      - name: Build AppImage (x64 baseline)
        run: |
          mkdir -p AppDir/usr/bin
          cp package/linux-x64/hardware-helper AppDir/usr/bin/

          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/latest/download/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage

          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable AppDir/usr/bin/hardware-helper \
            --output appimage || true

      # =========================
      # MACOS PACKAGING
      # =========================

      - name: Create macOS .app bundles
        run: |
          mkdir -p HardwareHelper-intel.app/Contents/MacOS
          mkdir -p HardwareHelper-arm64.app/Contents/MacOS

          cp package/macos-intel/hardware-helper HardwareHelper-intel.app/Contents/MacOS/
          cp package/macos-arm64/hardware-helper HardwareHelper-arm64.app/Contents/MacOS/

          chmod +x HardwareHelper-intel.app/Contents/MacOS/hardware-helper
          chmod +x HardwareHelper-arm64.app/Contents/MacOS/hardware-helper

      - name: Create macOS ZIPs
        run: |
          zip -r HardwareHelper-macos-intel.zip HardwareHelper-intel.app
          zip -r HardwareHelper-macos-arm64.zip HardwareHelper-arm64.app

      - name: Create macOS DMGs
        run: |
          brew install create-dmg || true

          create-dmg \
            --volname "HardwareHelper Intel" \
            HardwareHelper-macos-intel.dmg \
            HardwareHelper-intel.app || true

          create-dmg \
            --volname "HardwareHelper ARM64" \
            HardwareHelper-macos-arm64.dmg \
            HardwareHelper-arm64.app || true

      # =========================
      # UPLOAD ARTIFACTS
      # =========================

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packaged-releases
          path: |
            package/**
            *.zip
            *.deb
            *.AppImage
            *.dmg