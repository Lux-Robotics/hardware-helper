# Portable packages (self-contained workflow — no packaging/*.sh).
#
# Per OS/arch zip:
#   rockchip-universal-imager[.exe]
#   rkdeveloptool[.exe]
#   loader_binaries/
#   portable
#   (+ libusb-1.0.dll on Windows when MinGW-built)
#
# ---------------------------------------------------------------------------
# Runner model
# ---------------------------------------------------------------------------
# Self-hosted only. Each machine builds *its own OS only*, for the host arch
# plus aarch64 (cross when the runner is x86_64).
#
#   Linux runner  → linux-x86_64,  linux-aarch64
#   Windows runner → windows-x86_64, windows-aarch64
#   macOS runner  → macos-x86_64,  macos-aarch64
#
# Labels used: [self-hosted, Linux] | [self-hosted, Windows] | [self-hosted, macOS]
# (GitHub’s default OS labels on self-hosted runners.)
#
# ---------------------------------------------------------------------------
# Pre-installed system dependencies (DO NOT install in this workflow)
# ---------------------------------------------------------------------------
# Shared (all OSes):
#   - git (with submodule support)
#   - zip, unzip
#   - rustup + stable Rust (1.85+; see src-tauri/Cargo.toml rust-version)
#   - cargo (crates are fetched/built by this workflow; not pre-vendored)
#
# Linux (apt or equivalent already present):
#   - build-essential (gcc/g++, make)
#   - pkg-config, autoconf, automake, libtool
#   - libusb-1.0-0-dev, libudev-dev
#   - libssl-dev
#   - Tauri/WebKit: libwebkit2gtk-4.1-dev, libayatana-appindicator3-dev,
#     librsvg2-dev, patchelf
#   - aarch64 cross (for linux-aarch64 job): gcc-aarch64-linux-gnu,
#     g++-aarch64-linux-gnu, and matching libusb/webkit sysroots if required
#
# macOS (Xcode CLT + Homebrew already present):
#   - Xcode Command Line Tools (clang, lipo, etc.)
#   - brew: libusb, pkg-config, automake, autoconf, libtool
#   - Both archs: run on Apple Silicon or Intel with the other arch via
#     rustup target + arch flags as needed (universal not required)
#
# Windows (pre-provisioned runner, e.g. WINDOWS-11-CICD):
#   - Visual Studio Build Tools / MSVC (x64 + ARM64 toolsets)
#   - CMake, Ninja, Git for Windows (bash available)
#   - MSYS2 at C:\msys64 with MINGW64:
#       mingw-w64-x86_64-gcc, mingw-w64-x86_64-libusb,
#       mingw-w64-x86_64-pkg-config, autoconf, automake, libtool, make, zip
#   - llvm-mingw (or equivalent) for aarch64-w64-mingw32 (rkdeveloptool arm64)
#   - libusb-1.0.dll on PATH / under C:\msys64\mingw64\bin (staged into zip)
#
# This workflow only installs/updates *Rust* pieces (toolchain targets,
# tauri-cli crate, and Cargo crate deps via build).

name: Portable

on:
  push:
    branches: [main, master, "port/**", "ci/**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: portable-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  portable:
    name: portable (${{ matrix.os_label }}-${{ matrix.arch_label }})
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- Linux runner: Linux only (host + aarch64) ---
          - runner: [self-hosted, Linux]
            os_label: linux
            arch_label: x86_64
            rust_target: x86_64-unknown-linux-gnu
            app_name: rockchip-universal-imager
            rk_name: rkdeveloptool
            cross: false
          - runner: [self-hosted, Linux]
            os_label: linux
            arch_label: aarch64
            rust_target: aarch64-unknown-linux-gnu
            app_name: rockchip-universal-imager
            rk_name: rkdeveloptool
            cross: true

          # --- Windows runner: Windows only (host + aarch64) ---
          - runner: [self-hosted, Windows]
            os_label: windows
            arch_label: x86_64
            rust_target: x86_64-pc-windows-msvc
            app_name: rockchip-universal-imager.exe
            rk_name: rkdeveloptool.exe
            cross: false
          - runner: [self-hosted, Windows]
            os_label: windows
            arch_label: aarch64
            rust_target: aarch64-pc-windows-msvc
            app_name: rockchip-universal-imager.exe
            rk_name: rkdeveloptool.exe
            cross: true

          # --- macOS runner: macOS only (host + aarch64) ---
          - runner: [self-hosted, macOS]
            os_label: macos
            arch_label: x86_64
            rust_target: x86_64-apple-darwin
            app_name: rockchip-universal-imager
            rk_name: rkdeveloptool
            cross: true
          - runner: [self-hosted, macOS]
            os_label: macos
            arch_label: aarch64
            rust_target: aarch64-apple-darwin
            app_name: rockchip-universal-imager
            rk_name: rkdeveloptool
            cross: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # --- Rust only (no apt/brew/pacman) ---

      - name: Ensure Rust stable + target
        run: |
          set -euo pipefail
          command -v rustup >/dev/null
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add "${{ matrix.rust_target }}"
          rustc -vV
          rustup show

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: portable-${{ matrix.os_label }}-${{ matrix.arch_label }}

      - name: Install tauri-cli (crate)
        run: cargo install tauri-cli --version "^2" --locked

      # --- rkdeveloptool (C++; uses pre-installed toolchain) ---

      - name: Build rkdeveloptool
        env:
          OS_LABEL: ${{ matrix.os_label }}
          ARCH_LABEL: ${{ matrix.arch_label }}
          CROSS: ${{ matrix.cross }}
        run: |
          set -euo pipefail
          SRC="${{ github.workspace }}/dependencies/rkdeveloptool"
          BUILD="${{ github.workspace }}/dependencies/rkdeveloptool-build-${ARCH_LABEL}"
          OUT_DIR="${{ github.workspace }}/dist/companions"
          mkdir -p "$BUILD" "$OUT_DIR"
          test -d "$SRC"

          # Windows: prefer MSYS2 tools (pre-installed at C:\msys64)
          if [[ "$OS_LABEL" == "windows" ]]; then
            export PATH="/c/msys64/mingw64/bin:/c/msys64/usr/bin:/mingw64/bin:${PATH:-}"
            # Optional llvm-mingw for arm64 cross (document path on runner)
            for d in /c/llvm-mingw/bin "/c/Program Files/llvm-mingw/bin" /llvm-mingw/bin; do
              [[ -d "$d" ]] && export PATH="$d:$PATH" && break
            done
          fi

          if [[ ! -x "$SRC/configure" ]]; then
            (cd "$SRC" && ./autogen.sh)
          fi

          CONFIGURE_ARGS=()
          case "$OS_LABEL-$ARCH_LABEL" in
            linux-aarch64)
              CONFIGURE_ARGS+=(--host=aarch64-linux-gnu)
              export CC="${CC:-aarch64-linux-gnu-gcc}"
              export CXX="${CXX:-aarch64-linux-gnu-g++}"
              ;;
            windows-aarch64)
              CONFIGURE_ARGS+=(--host=aarch64-w64-mingw32)
              export CC="${CC:-aarch64-w64-mingw32-gcc}"
              export CXX="${CXX:-aarch64-w64-mingw32-g++}"
              ;;
            macos-x86_64)
              export CFLAGS="${CFLAGS:-} -arch x86_64"
              export CXXFLAGS="${CXXFLAGS:-} -arch x86_64"
              export LDFLAGS="${LDFLAGS:-} -arch x86_64"
              ;;
            macos-aarch64)
              export CFLAGS="${CFLAGS:-} -arch arm64"
              export CXXFLAGS="${CXXFLAGS:-} -arch arm64"
              export LDFLAGS="${LDFLAGS:-} -arch arm64"
              ;;
          esac

          (
            cd "$BUILD"
            # Out-of-tree configure; re-run cleanly per arch
            rm -rf ./*
            "$SRC/configure" "${CONFIGURE_ARGS[@]+"${CONFIGURE_ARGS[@]}"}"
            make -j"$(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 2)"
          )

          BUILT=""
          if [[ "$OS_LABEL" == "windows" ]]; then
            for c in "$BUILD/rkdeveloptool.exe" "$BUILD/rkdeveloptool" \
                     "$BUILD/.libs/rkdeveloptool.exe" "$BUILD/.libs/rkdeveloptool"; do
              [[ -f "$c" ]] && BUILT="$c" && break
            done
            test -n "$BUILT"
            cp "$BUILT" "$OUT_DIR/rkdeveloptool.exe"
            echo "RKDEV_BIN=$OUT_DIR/rkdeveloptool.exe" >> "$GITHUB_ENV"
          else
            for c in "$BUILD/rkdeveloptool" "$BUILD/.libs/rkdeveloptool"; do
              [[ -f "$c" ]] && BUILT="$c" && break
            done
            test -n "$BUILT"
            cp "$BUILT" "$OUT_DIR/rkdeveloptool"
            chmod +x "$OUT_DIR/rkdeveloptool"
            echo "RKDEV_BIN=$OUT_DIR/rkdeveloptool" >> "$GITHUB_ENV"
          fi
          ls -la "$OUT_DIR"

      # --- Tauri / Rust app (Cargo fetches crates) ---

      - name: Build Tauri app (raw binary, no OS installer shell)
        env:
          OS_LABEL: ${{ matrix.os_label }}
          ARCH_LABEL: ${{ matrix.arch_label }}
          RUST_TARGET: ${{ matrix.rust_target }}
        run: |
          set -euo pipefail
          # Point Cargo at pre-installed cross linkers when needed.
          case "$OS_LABEL-$ARCH_LABEL" in
            linux-aarch64)
              export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER="${CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER:-aarch64-linux-gnu-gcc}"
              ;;
            windows-aarch64)
              # MSVC arm64: rustup + VS ARM64 tools (no extra env usually).
              # MinGW arm64 alternative would set aarch64-w64-mingw32-gcc here.
              ;;
            macos-x86_64)
              export CARGO_TARGET_X86_64_APPLE_DARWIN_LINKER="${CARGO_TARGET_X86_64_APPLE_DARWIN_LINKER:-clang}"
              export CFLAGS_x86_64_apple_darwin="${CFLAGS_x86_64_apple_darwin:--arch x86_64}"
              ;;
            macos-aarch64)
              export CARGO_TARGET_AARCH64_APPLE_DARWIN_LINKER="${CARGO_TARGET_AARCH64_APPLE_DARWIN_LINKER:-clang}"
              export CFLAGS_aarch64_apple_darwin="${CFLAGS_aarch64_apple_darwin:--arch arm64}"
              ;;
          esac
          cargo tauri build --no-bundle --target "$RUST_TARGET"
        working-directory: ${{ github.workspace }}

      # --- Stage + zip (portable) ---

      - name: Package portable zip
        run: |
          set -euo pipefail
          OS="${{ matrix.os_label }}"
          ARCH="${{ matrix.arch_label }}"
          APP_NAME="${{ matrix.app_name }}"
          RK_NAME="${{ matrix.rk_name }}"
          RUST_TARGET="${{ matrix.rust_target }}"
          APP_BIN="${{ github.workspace }}/src-tauri/target/${RUST_TARGET}/release/${APP_NAME}"
          RKDEV_BIN="${RKDEV_BIN}"
          LOADER_SRC="${{ github.workspace }}/loader_binaries"
          FOLDER="rockchip-universal-imager-portable-${OS}-${ARCH}"
          STAGE="${{ github.workspace }}/dist/portable/staging/${FOLDER}"
          ZIP="${{ github.workspace }}/dist/portable/${FOLDER}.zip"

          test -f "$APP_BIN"
          test -f "$RKDEV_BIN"

          rm -rf "$STAGE"
          mkdir -p "$STAGE/loader_binaries"
          cp "$APP_BIN" "$STAGE/$APP_NAME"
          cp "$RKDEV_BIN" "$STAGE/$RK_NAME"
          chmod +x "$STAGE/$APP_NAME" "$STAGE/$RK_NAME" 2>/dev/null || true

          if [[ -d "$LOADER_SRC" ]]; then
            cp -R "$LOADER_SRC"/. "$STAGE/loader_binaries/" 2>/dev/null || true
          fi

          # Windows MinGW companion needs libusb beside it outside MSYS2
          if [[ "$OS" == "windows" ]]; then
            for d in /mingw64/bin "C:/msys64/mingw64/bin" "/c/msys64/mingw64/bin"; do
              if [[ -f "$d/libusb-1.0.dll" ]]; then
                cp "$d/libusb-1.0.dll" "$STAGE/"
                break
              fi
            done
          fi

          # Portable marker (paths::is_portable_build)
          : >"$STAGE/portable"

          mkdir -p "$(dirname "$ZIP")"
          (
            cd "${{ github.workspace }}/dist/portable/staging"
            rm -f "$ZIP"
            zip -r "$ZIP" "$FOLDER"
          )
          ls -la "$ZIP"
          unzip -l "$ZIP" | head -40

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: portable-${{ matrix.os_label }}-${{ matrix.arch_label }}
          path: dist/portable/*.zip
          if-no-files-found: error
