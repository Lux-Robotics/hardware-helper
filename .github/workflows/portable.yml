# Portable packages (self-contained workflow — no packaging/*.sh).
#
# Per OS/arch zip:
#   rockchip-universal-imager[.exe]
#   rkdeveloptool[.exe]
#   loader_binaries/
#   portable
#   (+ libusb-1.0.dll on Windows when MinGW-built)
#
# ---------------------------------------------------------------------------
# Runner model
# ---------------------------------------------------------------------------
# Self-hosted only. Each machine builds *its own OS only*, for native X64
# plus aarch64 cross (hosts are X64).
#
#   [self-hosted, Linux,  X64] → linux-x86_64,  linux-aarch64
#   [self-hosted, Windows, X64] → windows-x86_64, windows-aarch64
#   [self-hosted, macOS,  X64] → macos-x86_64,  macos-aarch64
#
# Labels (GitHub automatic only — no custom hostnames):
#   [self-hosted, Linux, X64] | [self-hosted, Windows, X64] | [self-hosted, macOS, X64]
# Matches any self-hosted runner with that OS + arch (e.g. Ubuntu-24, Windows-11,
# MacOS-Sequoia-CICD) without naming them.
#
# ---------------------------------------------------------------------------
# Pre-installed system dependencies (DO NOT install in this workflow)
# ---------------------------------------------------------------------------
# Shared (all OSes):
#   - git (with submodule support)
#   - zip, unzip
#   - rustup + stable Rust (1.85+; see src-tauri/Cargo.toml rust-version)
#   - cargo (crates are fetched/built by this workflow; not pre-vendored)
#
# Linux (apt or equivalent already present):
#   - build-essential (gcc/g++, make)
#   - pkg-config, autoconf, automake, libtool
#   - libusb-1.0-0-dev, libudev-dev
#   - libssl-dev
#   - Tauri/WebKit: libwebkit2gtk-4.1-dev, libayatana-appindicator3-dev,
#     librsvg2-dev, patchelf
#   - aarch64 cross (for linux-aarch64 job): gcc-aarch64-linux-gnu,
#     g++-aarch64-linux-gnu, and matching libusb/webkit sysroots if required
#
# macOS (Xcode CLT + Homebrew already present):
#   - Xcode Command Line Tools (clang, lipo, etc.)
#   - brew: libusb, pkg-config, automake, autoconf, libtool
#   - Both archs: run on Apple Silicon or Intel with the other arch via
#     rustup target + arch flags as needed (universal not required)
#
# Windows (pre-provisioned runner, e.g. WINDOWS-11-CICD):
#   - Visual Studio Build Tools / MSVC (x64 + ARM64 toolsets)
#   - CMake, Ninja, Git for Windows (bash available)
#   - MSYS2 (MINGW64 gcc, libusb, pkg-config, autotools); optional env:
#       MSYS2_ROOT, MSYS2_BASH, LLVM_MINGW_ROOT (set by bootstrap)
#   - llvm-mingw for aarch64-w64-mingw32 (rkdeveloptool arm64)
#   - Shell discovery: packaging/windows/windows-bash.cmd (x64 + arm64 jobs)
#
# This workflow only installs/updates *Rust* pieces (toolchain targets,
# tauri-cli crate, and Cargo crate deps via build).

name: Portable

on:
  workflow_dispatch:

concurrency:
  group: portable-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  portable:
    name: portable (${{ matrix.os_label }}-${{ matrix.arch_label }})
    runs-on: ${{ matrix.runner }}
    # Windows: discover bash via packaging/windows/windows-bash.cmd (no C:\msys64 hardcode).
    defaults:
      run:
        shell: ${{ matrix.shell }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- Linux X64 host: Linux only (native + aarch64 cross) ---
          - runner: [self-hosted, Linux, X64]
            shell: bash
            os_label: linux
            arch_label: x86_64
            rust_target: x86_64-unknown-linux-gnu
            app_name: rockchip-universal-imager
            rk_name: rkdeveloptool
            cross: false
          - runner: [self-hosted, Linux, X64]
            shell: bash
            os_label: linux
            arch_label: aarch64
            rust_target: aarch64-unknown-linux-gnu
            app_name: rockchip-universal-imager
            rk_name: rkdeveloptool
            cross: true

          # --- Windows X64 host: Windows only (native + aarch64 cross) ---
          - runner: [self-hosted, Windows, X64]
            shell: packaging\windows\windows-bash.cmd "{0}"
            os_label: windows
            arch_label: x86_64
            rust_target: x86_64-pc-windows-msvc
            app_name: rockchip-universal-imager.exe
            rk_name: rkdeveloptool.exe
            cross: false
          - runner: [self-hosted, Windows, X64]
            shell: packaging\windows\windows-bash.cmd "{0}"
            os_label: windows
            arch_label: aarch64
            rust_target: aarch64-pc-windows-msvc
            app_name: rockchip-universal-imager.exe
            rk_name: rkdeveloptool.exe
            cross: true

          # --- macOS X64 host: macOS only (native + aarch64 cross) ---
          - runner: [self-hosted, macOS, X64]
            shell: bash
            os_label: macos
            arch_label: x86_64
            rust_target: x86_64-apple-darwin
            app_name: rockchip-universal-imager
            rk_name: rkdeveloptool
            cross: false
          - runner: [self-hosted, macOS, X64]
            shell: bash
            os_label: macos
            arch_label: aarch64
            rust_target: aarch64-apple-darwin
            app_name: rockchip-universal-imager
            rk_name: rkdeveloptool
            cross: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # --- Rust only (no apt/brew/pacman) ---

      - name: Ensure Rust stable + target
        env:
          OS_LABEL: ${{ matrix.os_label }}
        run: |
          set -euo pipefail
          # shellcheck source=packaging/ci/ci-env.sh
          source packaging/ci/ci-env.sh
          cd "$(ci_workspace)"
          ci_setup_toolchain_path "$OS_LABEL"
          command -v rustup >/dev/null
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add "${{ matrix.rust_target }}"
          rustc -vV
          rustup show

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: portable-${{ matrix.os_label }}-${{ matrix.arch_label }}

      - name: Install tauri-cli (crate)
        env:
          OS_LABEL: ${{ matrix.os_label }}
        run: |
          set -euo pipefail
          source packaging/ci/ci-env.sh
          cd "$(ci_workspace)"
          ci_setup_toolchain_path "$OS_LABEL"
          cargo install tauri-cli --version "^2" --locked

      # --- rkdeveloptool (C++; uses pre-installed toolchain) ---

      - name: Build rkdeveloptool
        env:
          OS_LABEL: ${{ matrix.os_label }}
          ARCH_LABEL: ${{ matrix.arch_label }}
          CROSS: ${{ matrix.cross }}
        run: |
          set -euo pipefail
          source packaging/ci/ci-env.sh
          WS="$(ci_workspace)"
          cd "$WS"
          ci_setup_toolchain_path "$OS_LABEL"

          SRC="${WS}/dependencies/rkdeveloptool"
          BUILD="${WS}/build/rkdeveloptool-build-${ARCH_LABEL}"
          OUT_DIR="${WS}/dist/companions"
          mkdir -p "$BUILD" "$OUT_DIR"
          test -d "$SRC"

          if [[ ! -x "$SRC/configure" ]]; then
            (cd "$SRC" && ./autogen.sh)
          fi

          CONFIGURE_ARGS=()
          case "$OS_LABEL-$ARCH_LABEL" in
            linux-aarch64)
              CONFIGURE_ARGS+=(--host=aarch64-linux-gnu)
              export CC="${CC:-aarch64-linux-gnu-gcc}"
              export CXX="${CXX:-aarch64-linux-gnu-g++}"
              ;;
            windows-aarch64)
              CONFIGURE_ARGS+=(--host=aarch64-w64-mingw32)
              export CC="${CC:-aarch64-w64-mingw32-gcc}"
              export CXX="${CXX:-aarch64-w64-mingw32-g++}"
              ;;
            macos-x86_64)
              export CFLAGS="${CFLAGS:-} -arch x86_64"
              export CXXFLAGS="${CXXFLAGS:-} -arch x86_64 -Wno-vla-cxx-extension -Wno-error=vla-cxx-extension"
              export LDFLAGS="${LDFLAGS:-} -arch x86_64"
              if [[ "$(uname -m)" != "x86_64" ]]; then
                CONFIGURE_ARGS+=(--host=x86_64-apple-darwin)
              fi
              ;;
            macos-aarch64)
              export CFLAGS="${CFLAGS:-} -arch arm64"
              export CXXFLAGS="${CXXFLAGS:-} -arch arm64 -Wno-vla-cxx-extension -Wno-error=vla-cxx-extension"
              export LDFLAGS="${LDFLAGS:-} -arch arm64"
              if [[ "$(uname -m)" != "arm64" ]]; then
                CONFIGURE_ARGS+=(--host=aarch64-apple-darwin)
              fi
              ;;
          esac

          (
            cd "$BUILD"
            rm -rf ./*
            "$SRC/configure" "${CONFIGURE_ARGS[@]+"${CONFIGURE_ARGS[@]}"}"
            make -j"$(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 2)"
          )

          BUILT=""
          if [[ "$OS_LABEL" == "windows" ]]; then
            for c in "$BUILD/rkdeveloptool.exe" "$BUILD/rkdeveloptool" \
                     "$BUILD/.libs/rkdeveloptool.exe" "$BUILD/.libs/rkdeveloptool"; do
              [[ -f "$c" ]] && BUILT="$c" && break
            done
            test -n "$BUILT"
            cp "$BUILT" "$OUT_DIR/rkdeveloptool.exe"
            # GITHUB_ENV needs a path the next step can open; keep unix path for bash steps
            echo "RKDEV_BIN=$OUT_DIR/rkdeveloptool.exe" >> "$GITHUB_ENV"
          else
            for c in "$BUILD/rkdeveloptool" "$BUILD/.libs/rkdeveloptool"; do
              [[ -f "$c" ]] && BUILT="$c" && break
            done
            test -n "$BUILT"
            cp "$BUILT" "$OUT_DIR/rkdeveloptool"
            chmod +x "$OUT_DIR/rkdeveloptool"
            echo "RKDEV_BIN=$OUT_DIR/rkdeveloptool" >> "$GITHUB_ENV"
          fi
          ls -la "$OUT_DIR"

      # --- Tauri / Rust app (Cargo fetches crates) ---

      - name: Build Tauri app (raw binary, no OS installer shell)
        env:
          OS_LABEL: ${{ matrix.os_label }}
          ARCH_LABEL: ${{ matrix.arch_label }}
          RUST_TARGET: ${{ matrix.rust_target }}
        run: |
          set -euo pipefail
          source packaging/ci/ci-env.sh
          cd "$(ci_workspace)"
          ci_setup_toolchain_path "$OS_LABEL"
          case "$OS_LABEL-$ARCH_LABEL" in
            linux-aarch64)
              export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER="${CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER:-aarch64-linux-gnu-gcc}"
              ;;
            windows-aarch64) ;;
            macos-x86_64)
              export CARGO_TARGET_X86_64_APPLE_DARWIN_LINKER="${CARGO_TARGET_X86_64_APPLE_DARWIN_LINKER:-clang}"
              export CFLAGS_x86_64_apple_darwin="${CFLAGS_x86_64_apple_darwin:--arch x86_64}"
              ;;
            macos-aarch64)
              export CARGO_TARGET_AARCH64_APPLE_DARWIN_LINKER="${CARGO_TARGET_AARCH64_APPLE_DARWIN_LINKER:-clang}"
              export CFLAGS_aarch64_apple_darwin="${CFLAGS_aarch64_apple_darwin:--arch arm64}"
              ;;
          esac
          cargo tauri build --no-bundle --target "$RUST_TARGET"

      # --- Stage + zip (portable) ---

      - name: Package portable zip
        env:
          OS_LABEL: ${{ matrix.os_label }}
        run: |
          set -euo pipefail
          source packaging/ci/ci-env.sh
          WS="$(ci_workspace)"
          cd "$WS"
          ci_setup_toolchain_path "$OS_LABEL"

          OS="${{ matrix.os_label }}"
          ARCH="${{ matrix.arch_label }}"
          APP_NAME="${{ matrix.app_name }}"
          RK_NAME="${{ matrix.rk_name }}"
          RUST_TARGET="${{ matrix.rust_target }}"
          APP_BIN="${WS}/src-tauri/target/${RUST_TARGET}/release/${APP_NAME}"
          RKDEV_BIN="${RKDEV_BIN}"
          LOADER_SRC="${WS}/loader_binaries"
          FOLDER="rockchip-universal-imager-portable-${OS}-${ARCH}"
          STAGE="${WS}/dist/portable/staging/${FOLDER}"
          ZIP="${WS}/dist/portable/${FOLDER}.zip"

          test -f "$APP_BIN"
          test -f "$RKDEV_BIN"

          rm -rf "$STAGE"
          mkdir -p "$STAGE/loader_binaries"
          cp "$APP_BIN" "$STAGE/$APP_NAME"
          cp "$RKDEV_BIN" "$STAGE/$RK_NAME"
          chmod +x "$STAGE/$APP_NAME" "$STAGE/$RK_NAME" 2>/dev/null || true

          if [[ -d "$LOADER_SRC" ]]; then
            cp -R "$LOADER_SRC"/. "$STAGE/loader_binaries/" 2>/dev/null || true
          fi

          if [[ "$OS" == "windows" ]]; then
            mroot="${MSYS2_ROOT_UNIX:-}"
            for d in ${mroot:+"$mroot/mingw64/bin"} /mingw64/bin; do
              if [[ -n "$d" && -f "$d/libusb-1.0.dll" ]]; then
                cp "$d/libusb-1.0.dll" "$STAGE/"
                break
              fi
            done
          fi

          : >"$STAGE/portable"

          mkdir -p "$(dirname "$ZIP")"
          (
            cd "${WS}/dist/portable/staging"
            rm -f "$ZIP"
            zip -r "$ZIP" "$FOLDER"
          )
          ls -la "$ZIP"
          unzip -l "$ZIP" | head -40

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: portable-${{ matrix.os_label }}-${{ matrix.arch_label }}
          path: dist/portable/*.zip
          if-no-files-found: error
