name: Cross-platform build

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  RKDEV_REPO: https://github.com/lux-robotics/rkdeveloptool.git
  RKDEV_TAG: master
  # Artifactory configuration
  ARTIFACTORY_URL: ${{ secrets.ARTIFACTORY_URL }}
  ARTIFACTORY_REPO: ${{ secrets.ARTIFACTORY_REPO }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:

        - os: windows-latest
          runs_on: [self-hosted, Windows, X64]
          name: Windows_11
          arch: x64
          msystem: MINGW64
          msys2_libusb: mingw-w64-x86_64-libusb
          msys2_toolchain: mingw-w64-x86_64-toolchain
          rkdev_enable: true
          libwdi_enable: true

        # - os: windows-latest
        #   runs_on: Windows_11
        #   name: windows-arm64
        #   arch: ARM64
        #   msystem: CLANGARM64
        #   msys2_libusb: mingw-w64-clang-aarch64-libusb
        #   msys2_toolchain: mingw-w64-clang-aarch64-toolchain
        #   rkdev_enable: false
        #   libwdi_enable: false

        - os: ubuntu-24.04
          runs_on: [self-hosted, Linux, X64]
          name: Ubuntu_22

        # - os: ubuntu-24.04-arm
        #   runs_on: Ubuntu_22
        #   name: linux-arm64

        - os: macos-13
          runs_on: [self-hosted, macOS, X64]
          name: MacOS_Ventura
          osx_arch: x86_64

        # - os: macos-14
        #   runs_on: MacOS_Ventura
        #   name: macos-arm64
        #   osx_arch: arm64

    # Self-hosted runner configuration
    # Replace labels with your actual runner labels
    runs-on: ${{ matrix.runs_on }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Windows dependencies (MSYS2 for rkdeveloptool)
      - name: Setup MSYS2
        if: runner.os == 'Windows' && (matrix.rkdev_enable || matrix.libwdi_enable)
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          install: >-
            base-devel
            autoconf
            automake
            libtool
            pkg-config
            ${{ matrix.msys2_libusb }}
            ${{ matrix.msys2_toolchain }}

      - name: Ensure MSYS2 Toolchain
        if: runner.os == 'Windows' && (matrix.rkdev_enable || matrix.libwdi_enable)
        run: |
          C:/msys64/usr/bin/bash.exe -lc "case '${{ matrix.msystem }}' in MINGW64) ROOT=/mingw64;; CLANGARM64) ROOT=/clangarm64;; esac; export MSYSTEM=${{ matrix.msystem }}; export PATH=$ROOT/bin:/usr/bin; pacman -S --noconfirm --needed autoconf automake libtool pkgconf make ${{ matrix.msys2_toolchain }} ${{ matrix.msys2_libusb }}"

      - name: Download libusb-win32 driver files
        if: runner.os == 'Windows' && matrix.libwdi_enable
        run: |
          $zip = "$env:RUNNER_TEMP\libusb-win32.zip"
          $dir = "$env:RUNNER_TEMP\libusb-win32"
          Invoke-WebRequest -Uri "https://github.com/mcuee/libusb-win32/releases/download/release_1.4.0.2/libusb-win32-bin-1.4.0.2.zip" -OutFile $zip
          Expand-Archive -Force -Path $zip -DestinationPath $dir
          $dll = Get-ChildItem -Path $dir -Recurse -Filter libusb0.dll | Select-Object -First 1
          if (-not $dll) { throw "libusb0.dll not found in extracted archive" }
          $root = $dll.Directory.Parent.Parent.FullName
          $x86Sys = Join-Path $root "bin\x86\libusb0.sys"
          $x86Dll = Join-Path $root "bin\x86\libusb0_x86.dll"
          $x86Alt = Join-Path $root "bin\x86\libusb0.dll"
          if (-not (Test-Path $x86Dll) -and (Test-Path $x86Alt)) {
            Copy-Item -Force $x86Alt $x86Dll
          }
          $x64Sys = Join-Path $root "bin\amd64\libusb0.sys"
          $x64Dll = Join-Path $root "bin\amd64\libusb0.dll"
          if (-not (Test-Path $x86Sys) -or -not (Test-Path $x86Dll) -or -not (Test-Path $x64Sys) -or -not (Test-Path $x64Dll)) {
            throw "libusb-win32 driver files not found under $root"
          }
          $installRoot = "D:\libusb-win32"
          if (Test-Path $installRoot) { Remove-Item -Recurse -Force $installRoot }
          Copy-Item -Recurse -Force $root $installRoot
          $driverDir = ($installRoot -replace '\\','/')
          "LIBWDI_LIBUSB0_DIR=$driverDir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      # Linux dependencies
      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libudev-dev \
            libusb-1.0-0-dev \
            dh-autoreconf \
            autoconf \
            automake \
            libtool

      # macOS dependencies
      - name: Install macOS Dependencies
        if: runner.os == 'macOS'
        run: |
          brew update
          brew list pkgconf >/dev/null 2>&1 || brew install pkgconf
          brew list libusb >/dev/null 2>&1 || brew install libusb
          brew list autoconf >/dev/null 2>&1 || brew install autoconf
          brew list automake >/dev/null 2>&1 || brew install automake
          brew list libtool >/dev/null 2>&1 || brew install libtool

      # Configure Windows
      - name: Configure Windows
        if: runner.os == 'Windows'
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A ${{ matrix.arch }} -DRKDEV_REPO=${{ env.RKDEV_REPO }} -DRKDEV_TAG=${{ env.RKDEV_TAG }} -DRKDEV_BASH=C:/msys64/usr/bin/bash.exe -DRKDEV_MSYSTEM=${{ matrix.msystem }} -DRKDEV_ENABLE=${{ matrix.rkdev_enable }} -DLIBWDI_ENABLE=${{ matrix.libwdi_enable }} -DLIBWDI_LIBUSB0_DIR="${{ env.LIBWDI_LIBUSB0_DIR }}"

      # Configure Linux
      - name: Configure Linux
        if: runner.os == 'Linux'
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DRKDEV_REPO=${{ env.RKDEV_REPO }} \
            -DRKDEV_TAG=${{ env.RKDEV_TAG }}

      # Configure macOS
      - name: Configure macOS
        if: runner.os == 'macOS'
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DRKDEV_REPO=${{ env.RKDEV_REPO }} \
            -DRKDEV_TAG=${{ env.RKDEV_TAG }} \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.osx_arch }}
          
      # Build
      - name: Build
        run: |
          cmake --build build --config Release

      # Build package for upload
      - name: Build Package
        run: |
          mkdir -p upload_pkg
          cd build
          tar -czf ../upload_pkg/${{ matrix.name }}.tar.gz .

      # Upload to Artifactory
      - name: Upload to Artifactory
        shell: bash
        run: |
          set -euo pipefail
          # Build the remote path in Artifactory.
          DEST_PATH="${ARTIFACTORY_URL}/${ARTIFACTORY_REPO}/${GITHUB_REPOSITORY}/${GITHUB_WORKFLOW}/${GITHUB_RUN_NUMBER}/${{ matrix.profiles }}/${{ matrix.targets }}.tar.gz"
          echo "Uploading to: $DEST_PATH"
          curl -u "${ARTIFACTORY_USER}:${ARTIFACTORY_TOKEN}" \
            -T "upload_pkg/${{ matrix.name }}.tar.gz" \
            "$DEST_PATH"
          echo "Upload complete"
